name: Refrescar datos y modelo

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["src/**", "run.py", "requirements.txt"]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Ejecutar la tubería (ingesta + modelo)
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python run.py
      - name: Guardar datos y predicciones actualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tables/*.parquet
          git commit -m "Auto: refresco diario de datos y predicciones" || echo "Sin cambios que guardar"
          git push
